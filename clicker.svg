    <label for="c1" class="lb lb1">GO</label><label for="c2" class="lb lb2">GO</label><label for="c3" class="lb lb3">GO</label><label for="c4" class="lb lb4">GO</label><label for="c5" class="lb lb5">GO</label><label for="c6" class="lb lb6">GO</label><label for="c7" class="lb lb7">GO</label><label for="c8" class="lb lb8">GO</label><label for="c9" class="lb lb9">GO</label><label for="c10" class="lb lb10">GO</label><label for="c11" class="lb lb11">GO</label><label for="c12" class="lb lb12">GO</label><label for="c13" class="lb lb13">GO</label><label for="c14" class="lb lb14">GO</label><label for="c15" class="lb lb15">GO</label><label for="c16" class="lb lb16">GO</label><label for="c17" class="lb lb17">GO</label><label for="c18" class="lb lb18">GO</label><label for="c19" class="lb lb19">GO</label><label for="c20" class="lb lb20">GO</label><label for="c21" class="lb lb21">GO</label><label for="c22" class="lb lb22">GO</label><label for="c23" class="lb lb23">GO</label><label for="c24" class="lb lb24">GO</label><label for="c25" class="lb lb25">GO</label>

